# Global SwiftLint config for Claude code reviewer
# Used when a project has no local .swiftlint.yml

disabled_rules:
  - trailing_whitespace       # Xcode handles this
  - line_length               # Handled per-project preference

opt_in_rules:
  - force_unwrapping          # Warn on ! — use if-let or guard instead
  - weak_delegate             # Warn on strong delegate references (retain cycles)
  - unused_import             # Flag unused imports
  - empty_count               # Prefer isEmpty over count == 0
  - closure_spacing           # Consistent closure brace spacing
  - contains_over_filter_count  # Prefer contains over filter().count > 0

excluded:
  - Pods
  - .build
  - DerivedData

# Thresholds
file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 4
